<!DOCTYPE html>
<html>
<head>
    <title>Sistema Bancário</title>
</head>
<body>

<h1>Sistema Bancário</h1>

<h2>Criar Conta</h2>
<p>Nome:</p>
<input type="text">

<p>CPF:</p>
<input type="text">

<p>Saldo Inicial:</p>
<input type="text">

<button>Criar Conta</button>

<h2>Depositar</h2>
<input type="text" placeholder="Número da Conta">
<input type="text" placeholder="Valor">
<button>Depositar</button>

<h2>Sacar</h2>
<input type="text" placeholder="Número da Conta">
<input type="text" placeholder="Valor">
<button>Sacar</button>

<h2>Histórico</h2>
<input type="text" placeholder="Número da Conta">
<button>Ver Histórico</button>

</body>
</html>
